/* Remove o retângulo azul de foco em todos os elementos clicáveis (iOS Safari, Android, desktop) */
*,
*::before,
*::after {
  -webkit-tap-highlight-color: transparent;
}
button, a, [role="button"], input, select, textarea {
  outline: none !important;
  -webkit-tap-highlight-color: transparent !important;
}
button:focus, a:focus, [role="button"]:focus,
button:focus-visible, a:focus-visible, [role="button"]:focus-visible,
button:active, a:active, [role="button"]:active {
  outline: none !important;
  -webkit-focus-ring-color: transparent !important;
}
/* Remove a borda de seleção que aparece em alguns iOS quando o botão está ativo */

<script>
// Register service worker for PWA / offline
// Versão atual: APP_VERSION é checada e se mudar, força reload + cache clear
var APP_VERSION = 'v19';
var savedVersion = null;
try { savedVersion = localStorage.getItem('__app_version__'); } catch(e) {}

// Se a versão mudou, limpar todos os caches antes de prosseguir
if (savedVersion && savedVersion !== APP_VERSION && 'caches' in window) {
  caches.keys().then(function(names) {
    return Promise.all(names.map(function(n) { return caches.delete(n); }));
  });
}
// Também limpar blacklist de modelos TTS quando a versão muda
if (savedVersion && savedVersion !== APP_VERSION) {
  try {
    localStorage.removeItem('__tts_dead_models__');
    localStorage.removeItem('__tts_working_model__');
  } catch(e) {}
}
try { localStorage.setItem('__app_version__', APP_VERSION); } catch(e) {}

if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').then(function(reg) {
      // Força verificação de update toda vez que a página abre
      reg.update();
      // Se já há um SW ativo aguardando, ativa imediatamente
      if (reg.waiting) {
        reg.waiting.postMessage({ type: 'SKIP_WAITING' });
      }
      // Detecta novo SW instalando
      reg.addEventListener('updatefound', function() {
        var newSW = reg.installing;
        if (!newSW) return;
        newSW.addEventListener('statechange', function() {
          if (newSW.state === 'installed' && navigator.serviceWorker.controller) {
            // Nova versão instalada - reload depois de skipWaiting
            newSW.postMessage({ type: 'SKIP_WAITING' });
          }
        });
      });
    }).catch(function(e) { console.warn('SW:', e); });

    // Reload quando SW novo assume controle (1x apenas)
    var refreshing = false;
    navigator.serviceWorker.addEventListener('controllerchange', function() {
      if (refreshing) return;
      refreshing = true;
      window.location.reload();
    });
  });
}

// iOS unlock: speechSynthesis e AudioContext só funcionam após interação do usuário.
// Estratégia: a cada toque, garantir que speechSynthesis e AudioContext estão "vivos".
(function() {
  var unlocked = false;
  var sharedAudioCtx = null;

  function getOrCreateAudioCtx() {
    var Ctx = window.AudioContext || window.webkitAudioContext;
    if (!Ctx) return null;
    if (!sharedAudioCtx || sharedAudioCtx.state === 'closed') {
      try { sharedAudioCtx = new Ctx(); } catch(e) { return null; }
    }
    if (sharedAudioCtx.state === 'suspended') {
      try { sharedAudioCtx.resume(); } catch(e) {}
    }
    return sharedAudioCtx;
  }
  // Expõe para o bundle reutilizar (Er() no bundle)
  window.__sharedAudioCtx = getOrCreateAudioCtx;

  function unlockAudio() {
    try {
      // Toda vez: garantir AudioContext ativo
      getOrCreateAudioCtx();

      // Primeira vez: destravar speechSynthesis com utterance silenciosa
      if (!unlocked && window.speechSynthesis) {
        unlocked = true;
        // Alguns iOS precisam de speak inicial vazio para destravar
        try {
          var u = new SpeechSynthesisUtterance(' ');
          u.volume = 0;
          u.rate = 10;
          window.speechSynthesis.speak(u);
        } catch(e) {}
        // Pré-carrega vozes
        window.speechSynthesis.getVoices();
      }

      // iOS Safari: se está pausado, retoma
      if (window.speechSynthesis && window.speechSynthesis.paused) {
        try { window.speechSynthesis.resume(); } catch(e) {}
      }
    } catch(e) { console.warn('[Fluency] unlock audio:', e); }
  }

  ['touchstart','touchend','mousedown','click','keydown'].forEach(function(ev) {
    window.addEventListener(ev, unlockAudio, { capture: true });
  });

  // iOS lazy-carrega vozes
  if (window.speechSynthesis) {
    window.speechSynthesis.onvoiceschanged = function() {
      window.speechSynthesis.getVoices();
    };
    // Chamada inicial para começar a carregar
    window.speechSynthesis.getVoices();
  }

  // iOS pausa speechSynthesis após ~15s de inatividade
  if (window.speechSynthesis) {
    setInterval(function() {
      if (!unlocked) return;
      try {
        if (window.speechSynthesis.paused) {
          window.speechSynthesis.resume();
        }
      } catch(e) {}
    }, 8000);
  }
})();
</script>

<!-- Stub global: garante que window.__ttsState existe ANTES do bundle carregar -->
<script>
window.__ttsState = window.__ttsState || {
  loading: false,
  error: null,
  set: function(loading, error) {
    this.loading = loading;
    this.error = error;
    try {
      window.dispatchEvent(new CustomEvent('ttsstate', {
        detail: { loading: loading, error: error }
      }));
    } catch(e) {}
  }
};

<!-- bundle.js define window.React, window.ReactDOM e window.__AppComponent -->
<script src="bundle.js?v=19"></script>

<!-- Renderização em script separado, garantindo execução após bundle.js -->
<script>
(function() {
  function mountApp() {
    try {
      document.getElementById('bar').style.width = '90%';
      document.getElementById('splash-msg').textContent = 'Iniciando…';

      if (!window.ReactDOM || typeof window.ReactDOM.createRoot !== 'function') {
        throw new Error('ReactDOM.createRoot não está disponível. bundle.js pode não ter carregado.');
      }
      if (!window.__AppComponent) {
        throw new Error('__AppComponent não definido. bundle.js pode não ter carregado corretamente.');
      }

      window.ReactDOM.createRoot(document.getElementById('root')).render(
        window.React.createElement(window.__AppComponent)
      );
    } catch(e) {
      document.getElementById('bar').style.width = '100%';
      document.getElementById('splash-msg').textContent = '';
      var em = document.getElementById('errmsg');
      em.style.display = 'block';
      em.textContent = 'Erro: ' + e.message;
      console.error('[Fluency] Erro ao montar app:', e);
    }
  }

  // bundle.js é síncrono — executa imediatamente após o parse.
  // Mas em alguns browsers móveis o DOMContentLoaded ainda não disparou.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountApp);
  } else {
    mountApp();
  }
})();
</script>

<!-- Efeito LED azul nos botões de ouvir + feedback visual imediato -->
<script>
(function() {
  var _activeBtn = null;
  var _ledShownAt = 0;
  var _minLedDuration = 500; // mostrar LED por pelo menos 500ms

  // Heurística: detectar se um botão é de "ouvir áudio".
  // Procura pelo ícone Volume2/Play/Pause (lucide) ou texto contendo "Ouvir/Parar"
  function isAudioButton(btn) {
    if (!btn) return false;
    var txt = (btn.textContent || '').toLowerCase();
    if (txt.includes('ouvir') || txt.includes('parar') || txt.includes('gerando')) return true;
    // Lucide Volume2: <svg class="lucide-volume-2">
    var svg = btn.querySelector('svg');
    if (svg) {
      var cls = (svg.getAttribute('class') || '').toLowerCase();
      // ícones de áudio: volume, play, pause, square (parar)
      if (/volume|play|pause|square/.test(cls)) return true;
      // sem classe lucide explícita mas tem path com d específico do volume
      var paths = svg.querySelectorAll('path');
      for (var i = 0; i < paths.length; i++) {
        var d = paths[i].getAttribute('d') || '';
        if (d.indexOf('M11 5L6 9') === 0) return true; // volume2 lucide
      }
    }
    return false;
  }

  function addLed(btn) {
    if (!btn) return;
    removeLed();
    _activeBtn = btn;
    _ledShownAt = Date.now();
    btn.classList.add('__tts_led__');
  }

  function removeLed(force) {
    if (!_activeBtn) return;
    var elapsed = Date.now() - _ledShownAt;
    if (!force && elapsed < _minLedDuration) {
      // Aguarda atingir duração mínima
      setTimeout(function() { removeLed(true); }, _minLedDuration - elapsed);
      return;
    }
    _activeBtn.classList.remove('__tts_led__');
    _activeBtn = null;
  }

  // Capturamos o clique e, se for botão de áudio, mostramos LED imediatamente
  document.addEventListener('click', function(e) {
    var btn = e.target;
    while (btn && btn !== document.body) {
      if (btn.tagName === 'BUTTON') break;
      btn = btn.parentElement;
    }
    if (btn && btn.tagName === 'BUTTON') {
      window.__tts_last_clicked_btn__ = btn;
      if (isAudioButton(btn)) {
        addLed(btn);

        // iOS Safari precisa de uma chamada SÍNCRONA a speechSynthesis.speak()
        // dentro do gesture handler para "destravar" futuras chamadas durante essa
        // sessão. Disparamos uma utterance silenciosa que termina rápido.
        try {
          if (window.speechSynthesis) {
            // Resume se estiver pausado (iOS pausa após 15s)
            if (window.speechSynthesis.paused) window.speechSynthesis.resume();
            var primer = new SpeechSynthesisUtterance('.');
            primer.volume = 0;
            primer.rate = 10;
            window.speechSynthesis.speak(primer);
          }
        } catch(e) {}

        // Fail-safe: 5s máximo
        setTimeout(function() {
          if (_activeBtn === btn) removeLed(true);
        }, 5000);
      }
    }
  }, true);

  // Se o speechSynthesis terminar de falar, removemos o LED imediatamente
  if (window.speechSynthesis) {
    var checkInterval = setInterval(function() {
      if (_activeBtn && !window.speechSynthesis.speaking && !window.speechSynthesis.pending) {
        // Fala terminou
        var elapsed = Date.now() - _ledShownAt;
        if (elapsed > 300) { // não remove imediatamente se acabou de iniciar
          removeLed(true);
        }
      }
    }, 200);
  }

  // O bundle dispara 'ttsstate' quando começa/termina geração de áudio Gemini.
  // Mantemos compatibilidade: se loading=true, garante LED no último botão clicado.
  window.addEventListener('ttsstate', function(ev) {
    if (ev.detail && ev.detail.loading) {
      if (!_activeBtn && window.__tts_last_clicked_btn__) {
        addLed(window.__tts_last_clicked_btn__);
      }
    } else {
      removeLed();
    }
  });
})();
</script>

<script>
(function() {
  var panel = document.getElementById('__audio_diag__');
  var reopenBtn = document.getElementById('__diag_reopen__');
  var dot = document.getElementById('__diag_dot__');
  var statusEl = document.getElementById('__diag_status__');
  var voicesEl = document.getElementById('__diag_voices__');
  var unlockedEl = document.getElementById('__diag_unlocked__');
  var lastVoiceEl = document.getElementById('__diag_last_voice__');
  var logEl = document.getElementById('__diag_log__');
  var titleEl = document.getElementById('__diag_title__');
  var toggleEl = document.getElementById('__diag_toggle__');
  var closeEl = document.getElementById('__diag_close__');
  var headerEl = document.getElementById('__diag_header__');

  // Estado persistido no localStorage
  var STORAGE_KEY = '__fluency_diag_state__';
  function loadState() {
    try {
      var s = localStorage.getItem(STORAGE_KEY);
      return s ? JSON.parse(s) : { hidden: false, collapsed: false };
    } catch(e) { return { hidden: false, collapsed: false }; }
  }
  function saveState(state) {
    try { localStorage.setItem(STORAGE_KEY, JSON.stringify(state)); } catch(e) {}
  }
  var state = loadState();

  function applyState() {
    panel.classList.toggle('hidden', state.hidden);
    panel.classList.toggle('collapsed', state.collapsed);
    reopenBtn.classList.toggle('visible', state.hidden);
    toggleEl.textContent = state.collapsed ? '▸' : '▾';
  }
  applyState();

  // Header: clicar minimiza/expande
  headerEl.addEventListener('click', function(e) {
    if (e.target === closeEl) return; // botão de fechar tem handler próprio
    state.collapsed = !state.collapsed;
    saveState(state);
    applyState();
  });

  // Botão X: esconde completamente
  closeEl.addEventListener('click', function(e) {
    e.stopPropagation();
    state.hidden = true;
    saveState(state);
    applyState();
  });

  // Botão flutuante: reabre o painel
  reopenBtn.addEventListener('click', function() {
    state.hidden = false;
    state.collapsed = false;
    saveState(state);
    applyState();
  });

  // Quando o painel está colapsado, o clique no painel inteiro expande
  panel.addEventListener('click', function(e) {
    if (state.collapsed && !state.hidden) {
      state.collapsed = false;
      saveState(state);
      applyState();
    }
  });

  function logMsg(type, msg) {
    var line = document.createElement('div');
    line.className = '__' + type + '__';
    var time = new Date().toLocaleTimeString('pt-BR', {hour12: false}).slice(0,8);
    line.textContent = time + ' ' + msg;
    logEl.insertBefore(line, logEl.firstChild);
    while (logEl.children.length > 30) logEl.removeChild(logEl.lastChild);
  }
  window.__diag_log = logMsg;

  function setStatus(text, level) {
    statusEl.textContent = text;
    dot.className = '__diag_dot__ ' + (level || 'idle');
    titleEl.textContent = text;
  }

  // Atualiza vozes
  function updateVoices() {
    if (!window.speechSynthesis) {
      voicesEl.textContent = 'API indisponível';
      logMsg('err', 'speechSynthesis não suportado neste navegador');
      return;
    }
    var v = window.speechSynthesis.getVoices() || [];
    voicesEl.textContent = v.length;
  }
  updateVoices();
  if (window.speechSynthesis) {
    window.speechSynthesis.addEventListener('voiceschanged', updateVoices);
    setTimeout(updateVoices, 500);
    setTimeout(updateVoices, 1500);
  }

  // Detectar destravamento (primeiro toque)
  var firstClickLogged = false;
  document.addEventListener('click', function() {
    if (!firstClickLogged) {
      firstClickLogged = true;
      unlockedEl.textContent = 'sim';
      logMsg('ok', 'Áudio destravado (primeiro toque)');
      setTimeout(updateVoices, 100);
    }
  }, true);

  // Monitorar speechSynthesis a cada 300ms
  setInterval(function() {
    if (!window.speechSynthesis) return;
    var ss = window.speechSynthesis;
    if (ss.speaking) {
      setStatus('falando…', 'warn');
    } else if (ss.pending) {
      setStatus('na fila…', 'warn');
    } else if (ss.paused) {
      setStatus('pausado!', 'error');
      logMsg('warn', 'speechSynthesis está pausado, retomando…');
      try { ss.resume(); } catch(e) {}
    } else {
      if (statusEl.textContent === 'falando…' || statusEl.textContent === 'na fila…') {
        setStatus('pronto', 'idle');
      }
    }
    if (window.__ttsLastSpeak) {
      lastVoiceEl.textContent = window.__ttsLastSpeak.voice || '(padrão)';
    }
  }, 300);

  // Hook em SpeechSynthesisUtterance para capturar erros
  if (window.SpeechSynthesisUtterance) {
    var Original = window.SpeechSynthesisUtterance;
    window.SpeechSynthesisUtterance = function(text) {
      var inst = new Original(text);
      var origOnEnd = null, origOnError = null, origOnStart = null;
      Object.defineProperty(inst, 'onend', {
        get: function() { return origOnEnd; },
        set: function(fn) {
          origOnEnd = function() {
            logMsg('ok', 'Fala terminou ✓');
            if (fn) fn.apply(this, arguments);
          };
        }
      });
      Object.defineProperty(inst, 'onerror', {
        get: function() { return origOnError; },
        set: function(fn) {
          origOnError = function(ev) {
            var errType = ev && ev.error ? ev.error : 'desconhecido';
            logMsg('err', 'Erro fala: ' + errType);
            if (fn) fn.apply(this, arguments);
          };
        }
      });
      Object.defineProperty(inst, 'onstart', {
        get: function() { return origOnStart; },
        set: function(fn) {
          origOnStart = function() {
            logMsg('info', 'Fala iniciou ▶');
            if (fn) fn.apply(this, arguments);
          };
        }
      });
      var snippet = (text || '').slice(0, 30);
      logMsg('info', 'Utterance: "' + snippet + '"');
      return inst;
    };
  }

  // Hook em fetch para detectar chamadas Gemini TTS
  var origFetch = window.fetch;
  window.fetch = function(url, opts) {
    var u = (typeof url === 'string') ? url : (url && url.url) || '';
    if (u.includes('generativelanguage') && opts && opts.body) {
      var body = opts.body;
      if (typeof body === 'string' && body.includes('AUDIO')) {
        logMsg('info', 'Gemini TTS request →');
        return origFetch.apply(this, arguments).then(function(resp) {
          if (resp.ok) {
            logMsg('ok', 'Gemini TTS ' + resp.status);
            // Inspeciona resposta para logar mimeType
            var cloned = resp.clone();
            cloned.json().then(function(json) {
              try {
                var mt = json.candidates && json.candidates[0] &&
                         json.candidates[0].content && json.candidates[0].content.parts &&
                         json.candidates[0].content.parts[0] &&
                         json.candidates[0].content.parts[0].inlineData &&
                         json.candidates[0].content.parts[0].inlineData.mimeType;
                if (mt) logMsg('info', 'Gemini mime: ' + mt);
              } catch(e) {}
            }).catch(function(){});
          } else {
            logMsg('err', 'Gemini TTS ' + resp.status);
          }
          return resp;
        }).catch(function(err) {
          logMsg('err', 'Gemini fetch: ' + err.message);
          throw err;
        });
      }
    }
    return origFetch.apply(this, arguments);
  };

  // Erros globais não capturados
  window.addEventListener('error', function(ev) {
    if (ev.error) logMsg('err', 'JS: ' + ev.message);
  });
  window.addEventListener('unhandledrejection', function(ev) {
    var msg = ev.reason && ev.reason.message ? ev.reason.message : String(ev.reason);
    logMsg('err', 'Promise: ' + msg.slice(0, 80));
  });

  // Estado TTS do bundle
  window.addEventListener('ttsstate', function(ev) {
    if (ev.detail) {
      if (ev.detail.loading) {
        logMsg('info', 'TTS state: loading');
      } else if (ev.detail.error) {
        logMsg('err', 'TTS error: ' + ev.detail.error.slice(0, 60));
      } else {
        logMsg('ok', 'TTS state: idle');
      }
    }
  });

  setStatus('pronto', 'idle');
  logMsg('info', 'Diagnóstico iniciado');

  // API pública para controlar via console:
  // window.__diag.show()  → mostra painel
  // window.__diag.hide()  → esconde tudo (incluindo botão flutuante)
  // window.__diag.toggle() → alterna
  window.__diag = {
    show: function() {
      state.hidden = false; state.collapsed = false;
      saveState(state); applyState();
    },
    hide: function() {
      state.hidden = true;
      saveState(state); applyState();
      reopenBtn.classList.remove('visible');
    },
    toggle: function() {
      state.hidden = !state.hidden;
      saveState(state); applyState();
    },
    log: logMsg
  };
})();
</script>
</body>
</html>
