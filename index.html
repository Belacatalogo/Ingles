<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>

<!-- PWA -->
<link rel="manifest" href="manifest.json"/>
<meta name="theme-color" content="#060D1F"/>

<!-- iOS PWA -->
<meta name="apple-mobile-web-app-capable" content="yes"/>
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent"/>
<meta name="apple-mobile-web-app-title" content="Fluency"/>
<link rel="apple-touch-icon" href="apple-touch-icon.png"/>

<!-- Android / general -->
<meta name="mobile-web-app-capable" content="yes"/>
<meta name="application-name" content="Fluency"/>

<!-- SEO / share -->
<meta name="description" content="Aprenda inglês do A1 ao C2 com IA, flashcards e prática de speaking."/>
<meta property="og:title" content="Fluency — Aprenda Inglês com IA"/>
<meta property="og:description" content="Uma aula por dia, de segunda a sexta. Gramática, leitura, escrita, escuta e speaking."/>
<meta property="og:type" content="website"/>

<title>Fluency</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#060D1F;-webkit-text-size-adjust:100%}
#root{min-height:100vh}
#splash{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:linear-gradient(135deg,#060D1F 0%,#0A1428 50%,#0F1E40 100%);font-family:-apple-system,sans-serif}
#splash-logo{font-size:28px;font-weight:800;color:#E8EFF8;letter-spacing:-0.02em}
#splash-logo span{background:linear-gradient(135deg,#5B9CF6,#A78BFA);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
#bar-wrap{width:180px;height:3px;background:rgba(255,255,255,0.1);border-radius:4px;overflow:hidden}
#bar{height:3px;background:linear-gradient(90deg,#5B9CF6,#A78BFA);border-radius:4px;width:10%;transition:width 0.5s ease}
#splash-msg{color:rgba(255,255,255,0.4);font-size:12px}
#errmsg{color:#F87171;font-size:11px;max-width:280px;text-align:center;display:none;padding:0 20px;line-height:1.6;word-break:break-all}

/* LED azul nos botões de ouvir durante geração de áudio */
@keyframes __led_spin__ {
  0%   { transform: rotate(0deg); }
  100% { transform: rotate(360deg); }
}
@keyframes __led_pulse__ {
  0%, 100% { box-shadow: 0 0 0 0 rgba(91,156,246,0.7), 0 0 0 4px rgba(91,156,246,0.3); }
  50%       { box-shadow: 0 0 0 6px rgba(91,156,246,0.0), 0 0 0 10px rgba(91,156,246,0.0); }
}
.__tts_led__ {
  position: relative;
  overflow: visible !important;
}
.__tts_led__::before {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: inherit;
  border: 2px solid transparent;
  border-top-color: #5B9CF6;
  border-right-color: rgba(91,156,246,0.4);
  animation: __led_spin__ 0.8s linear infinite;
  pointer-events: none;
  z-index: 10;
}
.__tts_led__::after {
  content: '';
  position: absolute;
  inset: -3px;
  border-radius: inherit;
  box-shadow: 0 0 12px 2px rgba(91,156,246,0.5), 0 0 24px 4px rgba(91,156,246,0.2);
  pointer-events: none;
  z-index: 9;
  animation: __led_pulse__ 1.2s ease-in-out infinite;
}
</style>
</head>
<body>
<div id="root">
  <div id="splash">
    <p id="splash-logo">Fluency<span>.</span></p>
    <div id="bar-wrap"><div id="bar"></div></div>
    <p id="splash-msg">Carregando…</p>
    <p id="errmsg"></p>
  </div>
</div>
<script>
// Register service worker for PWA / offline
if ('serviceWorker' in navigator) {
  window.addEventListener('load', function() {
    navigator.serviceWorker.register('./sw.js').catch(function(e) { console.warn('SW:', e); });
  });
}
</script>

<!-- bundle.js define window.React, window.ReactDOM e window.__AppComponent -->
<script src="bundle.js"></script>

<!-- Renderização em script separado, garantindo execução após bundle.js -->
<script>
(function() {
  function mountApp() {
    try {
      document.getElementById('bar').style.width = '90%';
      document.getElementById('splash-msg').textContent = 'Iniciando…';

      if (!window.ReactDOM || typeof window.ReactDOM.createRoot !== 'function') {
        throw new Error('ReactDOM.createRoot não está disponível. bundle.js pode não ter carregado.');
      }
      if (!window.__AppComponent) {
        throw new Error('__AppComponent não definido. bundle.js pode não ter carregado corretamente.');
      }

      window.ReactDOM.createRoot(document.getElementById('root')).render(
        window.React.createElement(window.__AppComponent)
      );
    } catch(e) {
      document.getElementById('bar').style.width = '100%';
      document.getElementById('splash-msg').textContent = '';
      var em = document.getElementById('errmsg');
      em.style.display = 'block';
      em.textContent = 'Erro: ' + e.message;
      console.error('[Fluency] Erro ao montar app:', e);
    }
  }

  // bundle.js é síncrono — executa imediatamente após o parse.
  // Mas em alguns browsers móveis o DOMContentLoaded ainda não disparou.
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', mountApp);
  } else {
    mountApp();
  }
})();
</script>

<!-- Efeito LED azul nos botões de ouvir durante geração de áudio TTS -->
<script>
(function() {
  var _activeBtn = null;

  document.addEventListener('click', function(e) {
    var btn = e.target;
    while (btn && btn !== document.body) {
      if (btn.tagName === 'BUTTON') break;
      btn = btn.parentElement;
    }
    if (btn && btn.tagName === 'BUTTON') {
      window.__tts_last_clicked_btn__ = btn;
    }
  }, true);

  function addLed(btn) {
    if (!btn) return;
    removeLed();
    _activeBtn = btn;
    btn.classList.add('__tts_led__');
  }

  function removeLed() {
    if (_activeBtn) {
      _activeBtn.classList.remove('__tts_led__');
      _activeBtn = null;
    }
  }

  window.addEventListener('ttsstate', function(ev) {
    if (ev.detail && ev.detail.loading) {
      setTimeout(function() {
        addLed(window.__tts_last_clicked_btn__ || null);
      }, 10);
    } else {
      removeLed();
    }
  });
})();
</script>
</body>
</html>
