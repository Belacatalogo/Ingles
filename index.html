<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Fluency</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#F1E9DB;-webkit-text-size-adjust:100%}
#root{min-height:100vh}
#splash{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#F1E9DB;font-family:-apple-system,sans-serif}
#splash-title{color:#1C1914;font-size:22px;font-weight:800;letter-spacing:-.5px}
#splash-title span{color:#B53F1F}
#bar-wrap{width:200px;height:4px;background:#E0D5C5;border-radius:4px;overflow:hidden}
#bar{height:4px;background:#B53F1F;border-radius:4px;width:0%;transition:width 0.4s ease}
#steps{display:flex;flex-direction:column;gap:6px;width:220px}
.step{display:flex;align-items:center;gap:8px;font-size:12px;color:#8A7E6B}
.step.done{color:#2D6A4F;font-weight:600}
.step.active{color:#B53F1F;font-weight:600}
.step.err{color:#B53F1F;font-weight:600}
.dot{width:7px;height:7px;border-radius:50%;background:#D5C9B8;flex-shrink:0}
.step.done .dot{background:#2D6A4F}
.step.active .dot{background:#B53F1F}
.step.err .dot{background:#B53F1F}
#errmsg{color:#B53F1F;font-size:11px;max-width:260px;text-align:center;display:none;padding:0 20px;line-height:1.5}
</style>
</head>
<body>
<div id="root">
  <div id="splash">
    <p id="splash-title">Fluency<span>.</span></p>
    <div id="bar-wrap"><div id="bar"></div></div>
    <div id="steps">
      <div class="step active" id="s1"><span class="dot"></span>Carregando React…</div>
      <div class="step" id="s2"><span class="dot"></span>Carregando ReactDOM…</div>
      <div class="step" id="s3"><span class="dot"></span>Carregando ícones…</div>
      <div class="step" id="s4"><span class="dot"></span>Iniciando app…</div>
    </div>
    <p id="errmsg"></p>
  </div>
</div>
<script src="react.js"></script>
<script>document.getElementById('s1').className='step done';document.getElementById('s2').className='step active';document.getElementById('bar').style.width='25%';</script>
<script src="react-dom.js"></script>
<script>document.getElementById('s2').className='step done';document.getElementById('s3').className='step active';document.getElementById('bar').style.width='50%';</script>
<script src="lucide.js"></script>
<script>document.getElementById('s3').className='step done';document.getElementById('s4').className='step active';document.getElementById('bar').style.width='75%';</script>
<script src="app.js"></script>
<script>
document.getElementById('bar').style.width='90%';
try {
  ReactDOM.createRoot(document.getElementById('root')).render(React.createElement(App));
  document.getElementById('s4').className='step done';
  document.getElementById('bar').style.width='100%';
} catch(e) {
  document.getElementById('s4').className='step err';
  var em=document.getElementById('errmsg');
  em.style.display='block';
  em.textContent='Erro: '+e.message;
}
</script>
</body>
</html>
