<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0,maximum-scale=1.0,user-scalable=no"/>
<meta name="apple-mobile-web-app-capable" content="yes"/>
<title>Fluency</title>
<script src="https://cdn.tailwindcss.com"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{background:#F1E9DB;-webkit-text-size-adjust:100%}
#root{min-height:100vh}
#splash{display:flex;align-items:center;justify-content:center;min-height:100vh;flex-direction:column;gap:16px;background:#F1E9DB;font-family:-apple-system,sans-serif}
#splash-title{color:#1C1914;font-size:22px;font-weight:800}
#splash-title span{color:#B53F1F}
#bar-wrap{width:200px;height:4px;background:#E0D5C5;border-radius:4px;overflow:hidden}
#bar{height:4px;background:#B53F1F;border-radius:4px;width:10%;transition:width 0.5s ease}
#splash-msg{color:#8A7E6B;font-size:13px;font-family:-apple-system,sans-serif}
#errmsg{color:#B53F1F;font-size:11px;max-width:260px;text-align:center;display:none;padding:0 20px;line-height:1.5;word-break:break-all}
</style>
</head>
<body>
<div id="root">
  <div id="splash">
    <p id="splash-title">Fluency<span>.</span></p>
    <div id="bar-wrap"><div id="bar"></div></div>
    <p id="splash-msg">Carregando…</p>
    <p id="errmsg"></p>
  </div>
</div>
<script src="bundle.js"
  onload="
    document.getElementById('bar').style.width='90%';
    document.getElementById('splash-msg').textContent='Iniciando…';
    try {
      window.ReactDOM.createRoot(document.getElementById('root')).render(window.React.createElement(window.__AppComponent));
    } catch(e) {
      document.getElementById('bar').style.width='100%';
      document.getElementById('splash-msg').textContent='';
      var em=document.getElementById('errmsg');
      em.style.display='block';
      em.textContent='Erro: '+e.message;
    }
  "
  onerror="
    document.getElementById('splash-msg').textContent='';
    var em=document.getElementById('errmsg');
    em.style.display='block';
    em.textContent='Erro: bundle.js não carregou. Verifique se o arquivo existe no repositório.';
  "
></script>
</body>
</html>
