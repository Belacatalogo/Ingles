#splash{
  display:flex;align-items:center;justify-content:center;

  background:#F1E9DB;font-family:-apple-system,sans-serif;
}
#splash-title{color:#1C1914;font-size:22px;font-weight:800;letter-spacing:-.5px}
#splash-title span{color:#B53F1F}
#progress-bar-wrap{
  width:200px;height:4px;background:#E0D5C5;border-radius:4px;overflow:hidden;
}
#progress-bar{
  height:4px;background:#B53F1F;border-radius:4px;
  width:0%;transition:width 0.3s ease;
}
#splash-steps{
  display:flex;flex-direction:column;gap:6px;width:220px;
}
.step{
  display:flex;align-items:center;gap:8px;
  font-size:12px;color:#8A7E6B;transition:color .2s;
}
.step.done{color:#2D6A4F;font-weight:600}
.step.active{color:#B53F1F;font-weight:600}
.step-dot{
  width:7px;height:7px;border-radius:50%;
  background:#D5C9B8;flex-shrink:0;transition:background .2s;
}
.step.done .step-dot{background:#2D6A4F}
.step.active .step-dot{background:#B53F1F}
#splash-err{color:#B53F1F;font-size:12px;max-width:260px;text-align:center;display:none}
</style>

    <p id="splash-err"></p>

var _progress = 0;
function setStep(id, state) {
  var els = document.querySelectorAll('.step');
  els.forEach(function(el) { if(el.classList.contains('active')) el.classList.remove('active'); });
  var el = document.getElementById(id);
  if (!el) return;
  if (state === 'done') { el.classList.add('done'); el.classList.remove('active'); }
  else if (state === 'active') { el.classList.add('active'); }
  else if (state === 'error') { el.style.color='#B53F1F'; el.querySelector('.step-dot').style.background='#B53F1F'; }
}
function setProgress(pct) {
  var bar = document.getElementById('progress-bar');
  if (bar) bar.style.width = pct + '%';
}
function showError(msg) {
  var el = document.getElementById('splash-err');
  if (el) { el.style.display='block'; el.textContent='Erro: '+msg; }
}

function loadScript(src, cb) {
  var s = document.createElement('script');
  s.src = src;
  s.onload = function() { cb(null); };
  s.onerror = function() { cb(new Error(src)); };
  document.head.appendChild(s);
}

  return bank[level] || bank.A1;
};

// -----------------------------------------------------------
// Storage helpers
// -----------------------------------------------------------

const sGet = async key => {
  try {
    const r = localGet(key);
    if (!r) return null;
    try {
      return JSON.parse(r.value);
    } catch {
      return r.value;
    }
  } catch {
    return null;
  }
};
const sSet = async (key, value) => {
  try {
    const v = typeof value === "string" ? value : JSON.stringify(value);
    localSet(key, v);
    return true;
  } catch {
    return false;
  }
};

// -----------------------------------------------------------
// Dates
// -----------------------------------------------------------

const pad = n => String(n).padStart(2, "0");
const todayKey = () => {
  const d = new Date();
  return `${d.getFullYear()}-${pad(d.getMonth() + 1)}-${pad(d.getDate())}`;
};
const daysBetween = (a, b) => {
  const d1 = new Date(a + "T00:00:00");
  const d2 = new Date(b + "T00:00:00");
  return Math.round((d2 - d1) / 86400000);
};
const currentDay = () => new Date().getDay();
const prettyDate = () => {
  const d = new Date();
  const dias = ["domingo", "segunda", "terça", "quarta", "quinta", "sexta", "sábado"];
  const meses = ["jan", "fev", "mar", "abr", "mai", "jun", "jul", "ago", "set", "out", "nov", "dez"];
  return `${dias[d.getDay()]}, ${d.getDate()} de ${meses[d.getMonth()]}`;
};
