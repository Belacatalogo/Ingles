  <head>
    <meta charset="UTF-8" />

    <title>Fluency Clean</title>
    <style>
      html, body, #root { min-height: 100%; margin: 0; background: #050b18; }
      .static-boot-fallback { min-height: 100vh; display: grid; place-items: center; padding: 24px; color: #f8fafc; font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', Inter, system-ui, sans-serif; background: radial-gradient(circle at 50% 0%, rgba(126,112,255,.22), transparent 35%), linear-gradient(180deg,#080f22,#050b18); }
      .static-boot-card { width: min(520px, 100%); border: 1px solid rgba(147,160,213,.22); border-radius: 28px; padding: 24px; background: rgba(13,19,42,.88); box-shadow: 0 22px 70px rgba(0,0,0,.35); }
      .static-boot-card span { color: #93c5fd; font-size: 12px; font-weight: 900; letter-spacing: .14em; text-transform: uppercase; }
      .static-boot-card h1 { margin: 12px 0 8px; font-size: 30px; line-height: 1; }
      .static-boot-card p { margin: 0; color: #9ca8ca; line-height: 1.5; }
      .static-boot-card button { margin-top: 16px; min-height: 46px; border: 0; border-radius: 16px; padding: 0 16px; color: white; font-weight: 900; background: linear-gradient(135deg,#65a5ff,#a58aff); }
      .static-boot-card pre { white-space: pre-wrap; word-break: break-word; margin: 16px 0 0; padding: 14px; max-height: 280px; overflow: auto; border-radius: 16px; background: rgba(2,6,23,.72); color: #bfdbfe; font-size: 12px; line-height: 1.45; }
      .static-boot-card small { display: block; margin-top: 16px; color: #8f9ab9; }
    </style>
    <script>
      window.__FLUENCY_BOOT_LOGS__ = [];
      function fluencyBootLog(type, data) {
        try {
          window.__FLUENCY_BOOT_LOGS__.push({
            time: new Date().toISOString(),
            type: type,
            data: data
          });
          window.localStorage.setItem('fluency:boot-logs', JSON.stringify(window.__FLUENCY_BOOT_LOGS__));
        } catch (error) {}
      }
      fluencyBootLog('html-start', {
        href: window.location.href,
        userAgent: navigator.userAgent,
        online: navigator.onLine
      });
      window.addEventListener('error', function (event) {
        fluencyBootLog('window-error', {
          message: event.message,
          source: event.filename,
          line: event.lineno,
          column: event.colno,
          stack: event.error && event.error.stack ? event.error.stack : ''
        });
      });
      window.addEventListener('unhandledrejection', function (event) {
        var reason = event.reason || {};
        fluencyBootLog('unhandled-rejection', {
          message: reason.message || String(reason),
          stack: reason.stack || ''
        });
      });
      window.__FLUENCY_SHOW_BOOT_LOG__ = function () {
        var root = document.getElementById('root');
        if (!root) return;
        var logs = window.__FLUENCY_BOOT_LOGS__ || [];
        var text = JSON.stringify(logs, null, 2);
        root.innerHTML = '<div class="static-boot-fallback"><section class="static-boot-card"><span>Fluency Clean</span><h1>Log do preview</h1><p>Copie este log e envie no chat para eu localizar o erro real.</p><button type="button" onclick="navigator.clipboard && navigator.clipboard.writeText(document.getElementById(\'bootlog\').textContent)">Copiar log</button><pre id="bootlog"></pre><small>rewrite-clean-lab · seguro para testes</small></section></div>';
        document.getElementById('bootlog').textContent = text || '[]';
      };
      setTimeout(function () {
        var root = document.getElementById('root');
        if (!root) return;
        var text = (root.textContent || '').trim();
        if (!text || text.includes('Carregando preview seguro')) {
          fluencyBootLog('timeout-no-app-content', { rootText: text });
          window.__FLUENCY_SHOW_BOOT_LOG__();
        }
      }, 5000);
    </script>
    <script type="module" crossorigin src="./assets/index-DUoCBAiU.js"></script>
    <link rel="stylesheet" crossorigin href="./assets/index-aqNRHn6c.css">
    <link rel="stylesheet" href="./lab-progress-safe.css">
    <style id="lab-safe-visual-fixes">
      .reference-continue-button,
      .today-progress-hero .reference-continue-button {
        color: #ffffff !important;
        border: 0 !important;
        text-shadow: 0 1px 10px rgba(0,0,0,.22) !important;
        overflow: hidden !important;
      }
      .reference-continue-button span,
      .today-progress-hero .reference-continue-button span {
        display: inline-flex !important;
        margin: 0 !important;
        color: #ffffff !important;
        font-size: inherit !important;
        font-weight: 950 !important;
        line-height: 1 !important;
        text-transform: none !important;
        letter-spacing: -.01em !important;
        white-space: nowrap !important;
      }
      .reference-continue-button svg,
      .today-progress-hero .reference-continue-button svg {
        flex: 0 0 auto !important;
        color: #ffffff !important;
        stroke: #ffffff !important;
      }
      .layout-preview-switcher {
        padding: 10px 12px !important;
        border-radius: 18px !important;
        background: rgba(13,19,42,.48) !important;
        border-color: rgba(147,160,213,.18) !important;
      }
      .layout-preview-switcher > div:first-child p,
      .layout-preview-switcher .layout-preview-actions {
        display: none !important;
      }
      .layout-preview-switcher > div:first-child span {
        color: #8f9ab9 !important;
        font-size: 12px !important;
        letter-spacing: .04em !important;
      }
      .lesson-polished-hero {
        position: relative !important;
        overflow: hidden !important;
        padding: 24px !important;
        border: 1px solid rgba(147,160,213,.20) !important;
        border-radius: 28px !important;
        background: linear-gradient(135deg, rgba(19,27,57,.95), rgba(13,19,42,.76)) !important;
        box-shadow: 0 22px 70px rgba(0,0,0,.28), inset 0 1px 0 rgba(255,255,255,.03) !important;
      }
      .lesson-polished-hero::after {
        content: '' !important;
        position: absolute !important;
        width: 180px !important;
        height: 180px !important;
        right: -72px !important;
        top: -74px !important;
        border-radius: 999px !important;
        background: radial-gradient(circle, rgba(164,140,255,.32), transparent 64%) !important;
        pointer-events: none !important;
      }
      .lesson-polished-hero .eyebrow { color: #93c5fd !important; }
      .lesson-polished-hero h2 {
        color: #ffffff !important;
        font-size: clamp(30px, 8vw, 46px) !important;
        line-height: .98 !important;
      }
      .lesson-polished-hero p:not(.eyebrow) {
        max-width: 520px !important;
        color: #9ca8ca !important;
        font-size: 16px !important;
      }
    </style>

  <body>
    <div id="root">
      <div class="static-boot-fallback">
        <section class="static-boot-card">
          <span>Fluency Clean</span>
          <h1>Carregando preview seguro</h1>
          <p>Se esta mensagem não sumir, o log de erro aparecerá automaticamente em alguns segundos.</p>
          <button type="button" onclick="window.__FLUENCY_SHOW_BOOT_LOG__ && window.__FLUENCY_SHOW_BOOT_LOG__()">Mostrar log agora</button>
          <small>rewrite-clean-lab · seguro para testes</small>
        </section>
      </div>
    </div>
    <script>
      (function () {
        var label = 'rewrite-clean-lab · seguro para testes';
        var fixCss = '.reference-continue-button,.today-progress-hero .reference-continue-button{color:#fff!important;border:0!important;text-shadow:0 1px 10px rgba(0,0,0,.22)!important;overflow:hidden!important}.reference-continue-button span,.today-progress-hero .reference-continue-button span{display:inline-flex!important;margin:0!important;color:#fff!important;font-size:inherit!important;font-weight:950!important;line-height:1!important;text-transform:none!important;letter-spacing:-.01em!important;white-space:nowrap!important}.reference-continue-button svg,.today-progress-hero .reference-continue-button svg{flex:0 0 auto!important;color:#fff!important;stroke:#fff!important}.layout-preview-switcher{padding:10px 12px!important;border-radius:18px!important;background:rgba(13,19,42,.48)!important;border-color:rgba(147,160,213,.18)!important}.layout-preview-switcher>div:first-child p,.layout-preview-switcher .layout-preview-actions{display:none!important}.layout-preview-switcher>div:first-child span{color:#8f9ab9!important;font-size:12px!important;letter-spacing:.04em!important}.lesson-polished-hero{position:relative!important;overflow:hidden!important;padding:24px!important;border:1px solid rgba(147,160,213,.20)!important;border-radius:28px!important;background:linear-gradient(135deg,rgba(19,27,57,.95),rgba(13,19,42,.76))!important;box-shadow:0 22px 70px rgba(0,0,0,.28),inset 0 1px 0 rgba(255,255,255,.03)!important}.lesson-polished-hero:after{content:""!important;position:absolute!important;width:180px!important;height:180px!important;right:-72px!important;top:-74px!important;border-radius:999px!important;background:radial-gradient(circle,rgba(164,140,255,.32),transparent 64%)!important;pointer-events:none!important}.lesson-polished-hero .eyebrow{color:#93c5fd!important}.lesson-polished-hero h2{color:#fff!important;font-size:clamp(30px,8vw,46px)!important;line-height:.98!important}.lesson-polished-hero p:not(.eyebrow){max-width:520px!important;color:#9ca8ca!important;font-size:16px!important}';
        function ensureLateStyle() {
          var style = document.getElementById('lab-safe-visual-runtime-fixes');
          if (!style) {
            style = document.createElement('style');
            style.id = 'lab-safe-visual-runtime-fixes';
            document.head.appendChild(style);
          }
          if (style.textContent !== fixCss) style.textContent = fixCss;
        }
        function applyLessonHeroCopy() {
          var header = document.querySelector('.screen-stack > .section-header:first-child');
          if (!header) return;
          var title = header.querySelector('h2');
          if (!title || title.textContent.trim() !== 'Renderização por tipo de aula') return;
          var eyebrow = header.querySelector('.eyebrow');
          var description = Array.prototype.find.call(header.querySelectorAll('p'), function (item) {
            return !item.classList.contains('eyebrow');
          });
          if (eyebrow) eyebrow.textContent = 'Aula de hoje';
          title.textContent = 'Sua próxima aula está pronta';
          if (description) description.textContent = 'Estude com explicação guiada, prática ativa e conclusão salva no seu progresso.';
          header.classList.add('lesson-polished-hero');
        }
        function applyLabLabel() {
          var footer = document.querySelector('.preview-version-footer');
          if (footer && footer.textContent !== label) footer.textContent = label;
        }
        ensureLateStyle();
        applyLessonHeroCopy();
        applyLabLabel();
        setInterval(function () {
          ensureLateStyle();
          applyLessonHeroCopy();
          applyLabLabel();
        }, 700);
      })();
    </script>
  </body>
