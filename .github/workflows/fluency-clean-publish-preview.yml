name: Publish Fluency Clean Branch Preview

on:
  workflow_dispatch:
  push:
    branches:
      - rewrite-fluency-clean
    paths:
      - 'fluency-clean/**'
      - '.github/workflows/fluency-clean-publish-preview.yml'

permissions:
  contents: write

jobs:
  publish-preview:
    name: Build and commit preview-clean folder
    runs-on: ubuntu-latest
    steps:
      - name: Checkout branch
        uses: actions/checkout@v4
        with:
          ref: rewrite-fluency-clean
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install dependencies
        working-directory: fluency-clean
        run: npm install

      - name: Build clean app
        working-directory: fluency-clean
        run: npm run build

      - name: Copy build to preview-clean
        run: |
          rm -rf preview-clean
          mkdir -p preview-clean
          cp -R fluency-clean/dist/. preview-clean/
          touch preview-clean/.nojekyll
          cat > preview-clean/README.md <<'EOF'
          # Fluency Clean Preview

          Build estático do app `fluency-clean` gerado automaticamente pela branch `rewrite-fluency-clean`.

          Esta pasta é apenas para preview. Não é a main e não substitui o app atual.
          EOF

      - name: Commit preview output
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add preview-clean
          if git diff --cached --quiet; then
            echo "No preview changes to commit."
          else
            git commit -m "Publish clean rewrite preview"
            git push origin rewrite-fluency-clean
          fi
