name: Fluency Clean Preview

on:
  workflow_dispatch:
  push:
    branches:
      - rewrite-fluency-clean
    paths:
      - 'fluency-clean/**'
      - '.github/workflows/fluency-clean-preview.yml'

jobs:
  build:
    name: Build clean app
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: fluency-clean
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: fluency-clean/package-lock.json

      - name: Install dependencies
        run: npm install

      - name: Build
        run: npm run build

      - name: Upload preview artifact
        uses: actions/upload-artifact@v4
        with:
          name: fluency-clean-dist
          path: fluency-clean/dist
